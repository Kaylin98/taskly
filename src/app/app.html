<app-header />

<main>
    <ul id="users">
        @for (user of users; track user.id) {
            <li>
                <app-user-card [user]="user" [isSelected]="selectedUser?.id === user.id" (select)="onUserSelected($event)" />
            </li>
        }
    </ul>

    @if (selectedUser) {
        <app-tasks [name]="selectedUser.name" [id]="selectedUser.id" />
    }
    @else {
        <p id="fallback">Select a user to view their tasks.</p>
    }
</main>
